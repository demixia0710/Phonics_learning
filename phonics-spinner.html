<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>自然拼读随机挑战</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #e05898;
      --btn1:   #ffadd6;
      --btn2:   #a8b8ff;
    }

    body {
      background: linear-gradient(160deg, #fff5fa 0%, #f2f0ff 100%);
      font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 52px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 18px; }
    .header h1 { font-size: 1.5rem; font-weight: 900; color: #2a2040; }
    .header .sub { font-size: 0.85rem; color: #a090b8; margin-top: 5px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 6px;
      background: white;
      border-radius: 50px;
      padding: 5px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 22px;
    }
    .tab {
      border: none;
      background: transparent;
      border-radius: 40px;
      padding: 10px 20px;
      font-size: 0.88rem;
      font-weight: 800;
      color: #a090b8;
      cursor: pointer;
      transition: background 0.22s, color 0.22s, box-shadow 0.22s;
      letter-spacing: 0.02em;
      font-family: inherit;
      white-space: nowrap;
    }
    .tab.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    }

    /* ── Wheel ── */
    .wheel-area { position: relative; display: flex; flex-direction: column; align-items: center; }
    .pointer {
      font-size: 28px;
      color: var(--accent);
      line-height: 1;
      margin-bottom: -4px;
      z-index: 2;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.15));
      transition: color 0.25s;
    }
    #wheel { border-radius: 50%; box-shadow: 0 10px 50px rgba(0,0,0,0.11); display: block; }

    /* ── Spin button ── */
    .spin-btn {
      margin-top: 26px;
      padding: 15px 52px;
      font-size: 1.12rem;
      font-weight: 800;
      border: none;
      border-radius: 60px;
      background: linear-gradient(135deg, var(--btn1) 0%, var(--btn2) 100%);
      color: white;
      cursor: pointer;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 20px rgba(0,0,0,0.16);
      transition: transform 0.12s, background 0.25s;
      user-select: none;
      font-family: inherit;
    }
    .spin-btn:active { transform: scale(0.93); }

    /* ── Result card (shared shell) ── */
    .result {
      display: none;
      margin-top: 22px;
      background: white;
      border-radius: 26px;
      padding: 24px 26px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 36px rgba(0,0,0,0.08);
      text-align: center;
      animation: pop 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.88) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .r-label { font-size: 0.78rem; color: #c0b0d0; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 5px; }
    .r-main  { font-size: 3.4rem; font-weight: 900; color: var(--accent); letter-spacing: 0.06em; line-height: 1; margin-bottom: 5px; }
    .r-sub   { font-size: 0.88rem; color: #a090b8; margin-bottom: 12px; }
    .r-tag   {
      display: inline-block;
      border-radius: 20px;
      padding: 4px 16px;
      font-size: 0.83rem;
      font-weight: 700;
      margin-bottom: 13px;
    }
    .r-divider { border: none; border-top: 2px dashed #f0e8f4; margin-bottom: 13px; }
    .r-wlabel { font-size: 0.78rem; color: #c0b0d0; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 9px; }
    .r-words  { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .word-chip {
      background: linear-gradient(135deg, #fff8ff, #f4f0ff);
      border-radius: 14px;
      padding: 8px 16px;
      font-size: 1.08rem;
      font-weight: 700;
      color: #3a2858;
    }
    .word-chip .hi { color: var(--accent); }

    /* ── Magic E specific ── */
    .transform-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 8px 0 10px;
    }
    .t-word   { font-size: 2.5rem; font-weight: 900; line-height: 1; }
    .t-arrow  { font-size: 1.5rem; color: #c0a8b8; }
    .magic-e  { color: #f0a030; font-style: italic; }
    .pairs-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 6px 7px;
      align-items: center;
    }
    .pair-short { background: linear-gradient(135deg,#fff4e8,#ffeedc); border-radius: 11px; padding: 7px 11px; font-size: 0.98rem; font-weight: 700; color: #d07030; text-align: center; }
    .pair-arr   { color: #c09878; font-size: 0.88rem; text-align: center; }
    .pair-long  { background: linear-gradient(135deg,#fff0f6,#ffe8f4); border-radius: 11px; padding: 7px 11px; font-size: 0.98rem; font-weight: 700; color: #e05090; text-align: center; }
    .e-hi       { color: #f0a030; font-style: italic; }

  </style>
</head>
<body>

  <div class="header">
    <h1>自然拼读随机挑战</h1>
    <p class="sub">转动转盘，选出今日练习内容 ✨</p>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-0" onclick="switchTab(0)">CVC 词族</button>
    <button class="tab"        id="tab-1" onclick="switchTab(1)">Blends</button>
    <button class="tab"        id="tab-2" onclick="switchTab(2)">Magic E</button>
  </div>

  <div class="wheel-area">
    <div class="pointer" id="pointer">▼</div>
    <canvas id="wheel" width="360" height="360"></canvas>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="toggle()">▶ 开始转动！</button>

  <!-- CVC result -->
  <div class="result" id="result-0">
    <div class="r-label">今天练习</div>
    <div class="r-main" id="r0-main">-at</div>
    <div class="r-sub"  id="r0-sub">短元音 /æ/</div>
    <hr class="r-divider">
    <div class="r-wlabel">一起读这些词 👇</div>
    <div class="r-words" id="r0-words"></div>
  </div>

  <!-- Blends result -->
  <div class="result" id="result-1">
    <div class="r-label">今天练习</div>
    <div class="r-main" id="r1-main">bl</div>
    <div class="r-tag"  id="r1-tag">L-blend</div>
    <hr class="r-divider">
    <div class="r-wlabel">一起读这些词 👇</div>
    <div class="r-words" id="r1-words"></div>
  </div>

  <!-- Magic E result -->
  <div class="result" id="result-2">
    <div class="r-label">今天挑战</div>
    <div class="transform-row">
      <span class="t-word" id="r2-short">cap</span>
      <span class="t-arrow">→</span>
      <span class="t-word" id="r2-long">cap<span class="magic-e">e</span></span>
    </div>
    <div class="r-tag" id="r2-tag">a_e · 长元音 /eɪ/</div>
    <hr class="r-divider">
    <div class="r-wlabel">更多同类词对 👇</div>
    <div class="pairs-grid" id="r2-pairs"></div>
  </div>


<script>
  // ── DATA ─────────────────────────────────────────────────────────────

  const CVC_DATA = [
    { label:'-at', sub:'短元音 /æ/', words:['cat','bat','hat','mat','rat'] },
    { label:'-an', sub:'短元音 /æ/', words:['can','fan','man','pan','ran'] },
    { label:'-ap', sub:'短元音 /æ/', words:['cap','map','nap','tap','zap'] },
    { label:'-ad', sub:'短元音 /æ/', words:['bad','dad','had','mad','sad'] },
    { label:'-ig', sub:'短元音 /ɪ/', words:['big','dig','pig','wig','fig'] },
    { label:'-it', sub:'短元音 /ɪ/', words:['bit','fit','hit','sit','wit'] },
    { label:'-in', sub:'短元音 /ɪ/', words:['bin','fin','pin','tin','win'] },
    { label:'-ip', sub:'短元音 /ɪ/', words:['dip','hip','lip','rip','zip'] },
    { label:'-op', sub:'短元音 /ɒ/', words:['cop','hop','mop','pop','top'] },
    { label:'-ot', sub:'短元音 /ɒ/', words:['dot','hot','lot','pot','rot'] },
    { label:'-og', sub:'短元音 /ɒ/', words:['dog','fog','hog','log','jog'] },
    { label:'-ug', sub:'短元音 /ʌ/', words:['bug','hug','jug','mug','rug'] },
    { label:'-un', sub:'短元音 /ʌ/', words:['bun','fun','gun','run','sun'] },
    { label:'-ut', sub:'短元音 /ʌ/', words:['but','cut','hut','nut','gut'] },
    { label:'-ed', sub:'短元音 /e/', words:['bed','fed','led','red','wed'] },
    { label:'-en', sub:'短元音 /e/', words:['den','hen','men','pen','ten'] },
  ];

  const BLEND_DATA = [
    { label:'bl',  type:'L-blend',  words:['blue','black','blend','blink','blow'] },
    { label:'cl',  type:'L-blend',  words:['clap','club','clip','clock','class'] },
    { label:'fl',  type:'L-blend',  words:['flag','flat','flip','flock','fly'] },
    { label:'gl',  type:'L-blend',  words:['glad','glow','glue','glass','glen'] },
    { label:'pl',  type:'L-blend',  words:['plan','play','plus','plum','plug'] },
    { label:'sl',  type:'L-blend',  words:['slab','slip','slim','slop','slow'] },
    { label:'br',  type:'R-blend',  words:['brag','brick','bring','broke','brush'] },
    { label:'cr',  type:'R-blend',  words:['crab','crack','crop','crow','crush'] },
    { label:'dr',  type:'R-blend',  words:['drag','draw','drip','drop','drum'] },
    { label:'fr',  type:'R-blend',  words:['frog','from','fret','fresh','free'] },
    { label:'gr',  type:'R-blend',  words:['grab','grim','grin','grip','grow'] },
    { label:'tr',  type:'R-blend',  words:['trap','trim','trip','trot','truck'] },
    { label:'sk',  type:'S-blend',  words:['skip','skin','skill','skull','sky'] },
    { label:'sm',  type:'S-blend',  words:['smack','smell','smile','smoke','smug'] },
    { label:'sp',  type:'S-blend',  words:['span','spin','spot','spill','spud'] },
    { label:'st',  type:'S-blend',  words:['step','stem','still','stop','stuck'] },
    { label:'sw',  type:'S-blend',  words:['swim','swap','sweet','swift','swam'] },
    { label:'str', type:'3-letter', words:['strap','strip','strum','street','strong'] },
    { label:'spr', type:'3-letter', words:['spray','spring','sprig','sprint','spread'] },
    { label:'scr', type:'3-letter', words:['scram','scrub','screen','scroll','scrap'] },
  ];

  const MAGIC_DATA = [
    { short:'cap', long:'cape', vowel:'a_e · /eɪ/', type:'a', pairs:[['cap','cape'],['tap','tape'],['hat','hate'],['mad','made']] },
    { short:'hat', long:'hate', vowel:'a_e · /eɪ/', type:'a', pairs:[['hat','hate'],['fat','fate'],['rat','rate'],['mat','mate']] },
    { short:'tap', long:'tape', vowel:'a_e · /eɪ/', type:'a', pairs:[['tap','tape'],['cap','cape'],['nap','nape'],['gap','gape']] },
    { short:'mad', long:'made', vowel:'a_e · /eɪ/', type:'a', pairs:[['mad','made'],['bad','bade'],['fad','fade'],['lad','lade']] },
    { short:'bit', long:'bite', vowel:'i_e · /aɪ/', type:'i', pairs:[['bit','bite'],['kit','kite'],['sit','site'],['wit','wife']] },
    { short:'pin', long:'pine', vowel:'i_e · /aɪ/', type:'i', pairs:[['pin','pine'],['fin','fine'],['win','wine'],['din','dine']] },
    { short:'kit', long:'kite', vowel:'i_e · /aɪ/', type:'i', pairs:[['kit','kite'],['bit','bite'],['sit','site'],['fit','file']] },
    { short:'hid', long:'hide', vowel:'i_e · /aɪ/', type:'i', pairs:[['hid','hide'],['rid','ride'],['bid','bide'],['lid','like']] },
    { short:'hop', long:'hope', vowel:'o_e · /oʊ/', type:'o', pairs:[['hop','hope'],['mop','mope'],['cop','cope'],['top','tone']] },
    { short:'not', long:'note', vowel:'o_e · /oʊ/', type:'o', pairs:[['not','note'],['dot','dote'],['rot','role'],['lot','lobe']] },
    { short:'rob', long:'robe', vowel:'o_e · /oʊ/', type:'o', pairs:[['rob','robe'],['mob','mode'],['lob','lobe'],['nob','nose']] },
    { short:'cod', long:'code', vowel:'o_e · /oʊ/', type:'o', pairs:[['cod','code'],['nod','node'],['rod','rode'],['mod','mole']] },
    { short:'cut', long:'cute', vowel:'u_e · /juː/', type:'u', pairs:[['cut','cute'],['hut','huge'],['nut','nude'],['but','fuse']] },
    { short:'cub', long:'cube', vowel:'u_e · /juː/', type:'u', pairs:[['cub','cube'],['tub','tube'],['hub','huge'],['sub','sure']] },
    { short:'tun', long:'tune', vowel:'u_e · /juː/', type:'u', pairs:[['tun','tune'],['dun','dune'],['fun','fume'],['nun','nude']] },
    { short:'us',  long:'use',  vowel:'u_e · /juː/', type:'u', pairs:[['us','use'],['fus','fuse'],['mus','muse'],['pus','pure']] },
  ];

  // ── THEMES ───────────────────────────────────────────────────────────

  const THEMES = [
    {
      accent:'#e05898', btn1:'#ffadd6', btn2:'#a8b8ff',
      bg:'linear-gradient(160deg,#fff5fa 0%,#f2f0ff 100%)',
      hubLine1:'CVC', hubLine2:'词族', hubC1:'#c080d8', hubC2:'#a898c8',
      data: CVC_DATA,
      colors: ['#ffd6e8','#ffead6','#fff8d6','#d6fce8','#d6eeff','#ead6ff',
               '#ffd6e8','#ffead6','#fff8d6','#d6fce8','#d6eeff','#ead6ff',
               '#ffd6e8','#ffead6','#fff8d6','#d6eeff'],
      labelText:  item => item.label,
      labelColor: ()   => '#4a3060',
    },
    {
      accent:'#2a9a68', btn1:'#80e8b8', btn2:'#80b8ff',
      bg:'linear-gradient(160deg,#f0fff8 0%,#f0f5ff 100%)',
      hubLine1:'Blend', hubLine2:'挑战', hubC1:'#3aaa78', hubC2:'#80c0a0',
      data: BLEND_DATA,
      colors: ['#d6f5e0','#ccf0d8','#c8ecd4','#d0f2dc','#d4f4e0','#d8f6e4',
               '#d4e8ff','#cce4ff','#c8e0ff','#d0e4ff','#d4e8ff','#cce4ff',
               '#ead8ff','#e4d0ff','#e8d4ff','#e0ccff','#dcc8ff',
               '#ffd8d0','#ffd0d0','#ffccc8'],
      labelText:  item => item.label,
      labelColor: item =>
        item.type === 'L-blend'  ? '#1a4a3a' :
        item.type === 'R-blend'  ? '#1a3a6a' :
        item.type === 'S-blend'  ? '#3a1a6a' : '#5a1a0a',
    },
    {
      accent:'#e07030', btn1:'#ffb870', btn2:'#ff80b8',
      bg:'linear-gradient(160deg,#fffaf0 0%,#fff0f8 100%)',
      hubLine1:'Magic', hubLine2:'E ✨', hubC1:'#e07030', hubC2:'#f0a030',
      data: MAGIC_DATA,
      colors: ['#ffe8cc','#ffdfc4','#ffe4c8','#ffdabc',
               '#ffd0e8','#ffc8e4','#ffd4ec','#ffcce0',
               '#ffc8cc','#ffc0c8','#ffd0d4','#ffc4c8',
               '#e8d4ff','#e0caff','#e4d0ff','#dcc8ff'],
      labelText:  item => `${item.short}→${item.long}`,
      labelColor: item =>
        item.type === 'a' ? '#b05020' :
        item.type === 'i' ? '#b03060' :
        item.type === 'o' ? '#a02040' : '#601890',
    },
  ];

  // ── ENGINE ───────────────────────────────────────────────────────────

  const canvas = document.getElementById('wheel');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const R_OUT = 172, R_IN = 50;

  let activeTab    = 0;
  let savedAngles  = [0, 0, 0];
  let angle        = 0;
  let speed        = 0;
  let spinning     = false;
  let raf          = null;

  function draw(rot) {
    const th    = THEMES[activeTab];
    const data  = th.data;
    const N     = data.length;
    const SLICE = (2 * Math.PI) / N;

    ctx.clearRect(0, 0, W, H);

    for (let i = 0; i < N; i++) {
      const s = rot + i * SLICE;
      const e = s + SLICE;

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, R_OUT, s, e);
      ctx.closePath();
      ctx.fillStyle = th.colors[i % th.colors.length];
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.88)';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      const txt = th.labelText(data[i]);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(s + SLICE / 2);
      ctx.textAlign = 'right';
      ctx.font = txt.length > 5
        ? 'bold 11px Arial, sans-serif'
        : 'bold 15px "Arial Rounded MT Bold", Arial, sans-serif';
      ctx.fillStyle   = th.labelColor(data[i]);
      ctx.shadowColor = 'rgba(255,255,255,0.95)';
      ctx.shadowBlur  = 5;
      ctx.fillText(txt, R_OUT - 8, 5);
      ctx.restore();
    }

    // Outer accent ring
    ctx.beginPath();
    ctx.arc(cx, cy, R_OUT, 0, 2 * Math.PI);
    ctx.strokeStyle = th.accent + '2a';
    ctx.lineWidth   = 4;
    ctx.stroke();

    // Center hub
    ctx.beginPath();
    ctx.arc(cx, cy, R_IN, 0, 2 * Math.PI);
    ctx.fillStyle   = 'white';
    ctx.fill();
    ctx.strokeStyle = th.accent + '44';
    ctx.lineWidth   = 2.5;
    ctx.stroke();

    ctx.shadowBlur  = 0;
    ctx.textAlign   = 'center';
    ctx.font        = 'bold 12px "Arial Rounded MT Bold", Arial, sans-serif';
    ctx.fillStyle   = th.hubC1;
    ctx.fillText(th.hubLine1, cx, cy - 5);
    ctx.font        = '11px Arial, sans-serif';
    ctx.fillStyle   = th.hubC2;
    ctx.fillText(th.hubLine2, cx, cy + 12);
  }

  function getSelected() {
    const th    = THEMES[activeTab];
    const N     = th.data.length;
    const SLICE = (2 * Math.PI) / N;
    const norm  = ((-Math.PI / 2 - angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
    return th.data[Math.floor(norm / SLICE) % N];
  }

  // ── RESULT RENDERING ─────────────────────────────────────────────────

  function hideAll() {
    [0,1,2].forEach(i => { document.getElementById(`result-${i}`).style.display = 'none'; });
  }

  function showResult() {
    hideAll();
    const item = getSelected();
    const card = document.getElementById(`result-${activeTab}`);

    if (activeTab === 0) {
      const suffix = item.label.slice(1);
      document.getElementById('r0-main').textContent = item.label;
      document.getElementById('r0-sub').textContent  = item.sub;
      const wl = document.getElementById('r0-words');
      wl.innerHTML = '';
      item.words.forEach(w => {
        const c = document.createElement('div');
        c.className = 'word-chip';
        c.innerHTML = `${w.slice(0, w.length - suffix.length)}<span class="hi">${suffix}</span>`;
        wl.appendChild(c);
      });

    } else if (activeTab === 1) {
      const TC  = { 'L-blend':'#2a9a68','R-blend':'#2a6aaa','S-blend':'#7a4aaa','3-letter':'#c0503a' };
      const TBG = {
        'L-blend':'linear-gradient(135deg,#d4f5e8,#d4e8ff)',
        'R-blend':'linear-gradient(135deg,#d4e4ff,#d4d4ff)',
        'S-blend':'linear-gradient(135deg,#ead4ff,#d8d4ff)',
        '3-letter':'linear-gradient(135deg,#ffd8d4,#ffd4e8)',
      };
      const main = document.getElementById('r1-main');
      main.textContent = item.label;
      main.style.color = TC[item.type];
      const tag = document.getElementById('r1-tag');
      tag.textContent       = item.type;
      tag.style.background  = TBG[item.type];
      tag.style.color       = TC[item.type];
      const wl = document.getElementById('r1-words');
      wl.innerHTML = '';
      item.words.forEach(w => {
        const c  = document.createElement('div');
        c.className = 'word-chip';
        const bl = item.label;
        if (w.startsWith(bl)) {
          c.innerHTML = `<span class="hi" style="color:${TC[item.type]}">${bl}</span>${w.slice(bl.length)}`;
        } else {
          c.textContent = w;
        }
        wl.appendChild(c);
      });

    } else {
      const TC = { a:'#e07030', i:'#e05090', o:'#d03060', u:'#8040c0' };
      const tc = TC[item.type];

      const shortEl = document.getElementById('r2-short');
      shortEl.textContent = item.short;
      shortEl.style.color = tc;

      const longEl = document.getElementById('r2-long');
      longEl.innerHTML    = `${item.long.slice(0,-1)}<span class="magic-e">e</span>`;
      longEl.style.color  = tc;

      const tag = document.getElementById('r2-tag');
      tag.textContent      = item.vowel;
      tag.style.background = 'linear-gradient(135deg,#fff4e8,#ffe8f4)';
      tag.style.color      = tc;

      const grid = document.getElementById('r2-pairs');
      grid.innerHTML = '';
      item.pairs.slice(0, 4).forEach(([sh, lo]) => {
        const s   = document.createElement('div'); s.className = 'pair-short'; s.textContent = sh;
        const arr = document.createElement('div'); arr.className = 'pair-arr';  arr.textContent = '→';
        const l   = document.createElement('div'); l.className = 'pair-long';
        l.innerHTML = `${lo.slice(0,-1)}<span class="e-hi">e</span>`;
        grid.appendChild(s); grid.appendChild(arr); grid.appendChild(l);
      });
    }

    card.style.display = 'none';
    void card.offsetWidth;
    card.style.display = 'block';
  }

  // ── ANIMATION ────────────────────────────────────────────────────────

  function animStep() {
    if (!spinning) return;
    angle += speed;
    speed *= 0.9875;
    draw(angle);
    speed > 0.003 ? (raf = requestAnimationFrame(animStep)) : finish();
  }

  function finish() {
    cancelAnimationFrame(raf);
    spinning = false;
    speed    = 0;
    savedAngles[activeTab] = angle;
    const btn = document.getElementById('spinBtn');
    btn.textContent = '▶ 再转一次！';
    showResult();
  }

  function toggle() {
    if (spinning) {
      finish();
    } else {
      hideAll();
      speed    = 0.24 + Math.random() * 0.14;
      spinning = true;
      document.getElementById('spinBtn').textContent = '⏸ 暂停！';
      animStep();
    }
  }

  // ── TAB SWITCHING ─────────────────────────────────────────────────────

  function applyTheme(idx) {
    const th = THEMES[idx];
    const r  = document.documentElement.style;
    r.setProperty('--accent', th.accent);
    r.setProperty('--btn1',   th.btn1);
    r.setProperty('--btn2',   th.btn2);
    document.body.style.background = th.bg;
  }

  function switchTab(idx) {
    if (spinning) { cancelAnimationFrame(raf); spinning = false; speed = 0; }
    savedAngles[activeTab] = angle;
    activeTab = idx;
    angle     = savedAngles[idx];

    for (let i = 0; i < 3; i++) {
      document.getElementById(`tab-${i}`).classList.toggle('active', i === idx);
    }

    applyTheme(idx);
    hideAll();
    document.getElementById('spinBtn').textContent = '▶ 开始转动！';
    draw(angle);
  }

  // ── INIT ─────────────────────────────────────────────────────────────
  applyTheme(0);
  draw(0);
</script>
</body>
</html>
