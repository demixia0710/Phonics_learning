<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 2000">
  <style>
    .title { font: bold 72px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #1a1a1a; }
    .subtitle { font: 36px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #666; }
    .big-e { font: bold 200px -apple-system, "SF Pro Display", sans-serif; fill: #8b5cf6; }
    .content { font: 40px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #333; }
    .highlight { font: bold 48px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #8b5cf6; }
    .formula { font: bold 56px -apple-system, "SF Pro Display", sans-serif; fill: #1a1a1a; }
  </style>
  
  <rect width="1500" height="2000" fill="#fafbfc"/>
  
  <text x="750" y="150" text-anchor="middle" class="title">什么是魔法 e？</text>
  <text x="750" y="220" text-anchor="middle" class="subtitle">Magic E - 最神奇的字母</text>
  
  <!-- 魔法e展示 -->
  <g transform="translate(750, 500)">
    <circle cx="0" cy="0" r="180" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="6"/>
    <text x="0" y="60" text-anchor="middle" class="big-e">e</text>
    <!-- 魔法星星 -->
    <text x="-150" y="-100" font-size="48">✨</text>
    <text x="150" y="-80" font-size="48">✨</text>
    <text x="180" y="50" font-size="48">✨</text>
    <text x="-180" y="80" font-size="48">✨</text>
  </g>
  
  <!-- 三个特点 -->
  <g transform="translate(750, 850)">
    <rect x="-550" y="-30" width="1100" height="100" rx="20" fill="#fef3c7"/>
    <text x="0" y="45" text-anchor="middle" class="content">1️⃣ 魔法 e 在单词结尾，自己不发音</text>
  </g>
  
  <g transform="translate(750, 1000)">
    <rect x="-550" y="-30" width="1100" height="100" rx="20" fill="#dbeafe"/>
    <text x="0" y="45" text-anchor="middle" class="content">2️⃣ 它让前面的元音"变长"，读字母本音</text>
  </g>
  
  <g transform="translate(750, 1150)">
    <rect x="-550" y="-30" width="1100" height="100" rx="20" fill="#dcfce7"/>
    <text x="0" y="45" text-anchor="middle" class="content">3️⃣ 结构：辅音 + 元音 + 辅音 + e (CVCe)</text>
  </g>
  
  <!-- 公式展示 -->
  <g transform="translate(750, 1400)">
    <rect x="-400" y="-80" width="800" height="160" rx="30" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="4"/>
    <text x="-250" y="20" text-anchor="middle" class="formula">C</text>
    <text x="-120" y="20" text-anchor="middle" class="formula" fill="#ef4444">V</text>
    <text x="10" y="20" text-anchor="middle" class="formula">C</text>
    <text x="140" y="20" text-anchor="middle" class="formula" fill="#8b5cf6">e</text>
    <text x="280" y="20" text-anchor="middle" font-size="44" fill="#666">✨</text>
  </g>
  
  <g transform="translate(750, 1520)">
    <text x="-250" y="0" text-anchor="middle" font-size="28" fill="#666" font-family="-apple-system, PingFang SC, sans-serif">辅音</text>
    <text x="-120" y="0" text-anchor="middle" font-size="28" fill="#ef4444" font-family="-apple-system, PingFang SC, sans-serif">元音</text>
    <text x="10" y="0" text-anchor="middle" font-size="28" fill="#666" font-family="-apple-system, PingFang SC, sans-serif">辅音</text>
    <text x="140" y="0" text-anchor="middle" font-size="28" fill="#8b5cf6" font-family="-apple-system, PingFang SC, sans-serif">魔法e</text>
  </g>
  
  <!-- 底部比喻 -->
  <g transform="translate(750, 1780)">
    <rect x="-500" y="-70" width="1000" height="140" rx="70" fill="#8b5cf6"/>
    <text x="0" y="25" text-anchor="middle" font-size="44" fill="#fff" font-weight="bold" font-family="-apple-system, PingFang SC, sans-serif">就像魔法棒，隔空改变元音发音 🪄</text>
  </g>
</svg>
