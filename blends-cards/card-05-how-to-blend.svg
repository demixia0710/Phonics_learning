<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 2000">
  <rect width="1500" height="2000" fill="#f8fafc"/>
  <rect width="1500" height="10" fill="#3b82f6"/>
  <text x="100" y="72" style="font-size:28px;fill:#93c5fd;font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;">05 / 08</text>
  <text x="1400" y="72" text-anchor="end" style="font-size:28px;fill:#93c5fd;font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;">辅音连缀 Blends</text>
  <text x="750" y="188" text-anchor="middle" style="font-size:80px;font-weight:700;fill:#0f172a;font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;">连读三步法</text>
  <text x="750" y="248" text-anchor="middle" style="font-size:40px;fill:#3b82f6;font-family:-apple-system,'PingFang SC',sans-serif;">以 "black" 为例</text>
  <rect x="100" y="272" width="1300" height="5" fill="#bfdbfe" rx="2"/>

  <!-- Step 1 -->
  <rect x="100" y="320" width="1300" height="340" rx="20" fill="#fff"/>
  <rect x="100" y="320" width="10" height="340" rx="5" fill="#93c5fd"/>
  <circle cx="200" cy="490" r="55" fill="#dbeafe"/>
  <text x="200" y="508" text-anchor="middle" style="font-size:52px;font-weight:700;fill:#1d4ed8;font-family:-apple-system,sans-serif;">1</text>
  <text x="310" y="420" style="font-size:46px;font-weight:700;fill:#0f172a;font-family:-apple-system,'PingFang SC',sans-serif;">分开发音（慢速）</text>
  <text x="310" y="490" style="font-size:40px;fill:#374151;font-family:-apple-system,sans-serif;">b ....  l ....  ack</text>
  <text x="310" y="560" style="font-size:34px;fill:#6b7280;font-family:-apple-system,'PingFang SC',sans-serif;">每个音单独清晰发出，中间有停顿</text>
  <text x="310" y="620" style="font-size:34px;fill:#3b82f6;font-family:-apple-system,'PingFang SC',sans-serif;">手指依次指向 b、l 两个字母</text>

  <!-- Arrow down 1 -->
  <text x="750" y="730" text-anchor="middle" style="font-size:60px;fill:#3b82f6;font-family:-apple-system,sans-serif;">↓</text>

  <!-- Step 2 -->
  <rect x="100" y="760" width="1300" height="340" rx="20" fill="#fff"/>
  <rect x="100" y="760" width="10" height="340" rx="5" fill="#3b82f6"/>
  <circle cx="200" cy="930" r="55" fill="#bfdbfe"/>
  <text x="200" y="948" text-anchor="middle" style="font-size:52px;font-weight:700;fill:#1d4ed8;font-family:-apple-system,sans-serif;">2</text>
  <text x="310" y="860" style="font-size:46px;font-weight:700;fill:#0f172a;font-family:-apple-system,'PingFang SC',sans-serif;">减少停顿（中速）</text>
  <text x="310" y="930" style="font-size:40px;fill:#374151;font-family:-apple-system,sans-serif;">b-l .. ack</text>
  <text x="310" y="1000" style="font-size:34px;fill:#6b7280;font-family:-apple-system,'PingFang SC',sans-serif;">b 和 l 之间停顿缩短，开始感受连接</text>
  <text x="310" y="1060" style="font-size:34px;fill:#3b82f6;font-family:-apple-system,'PingFang SC',sans-serif;">嘴型从 b 的位置不停顿滑向 l</text>

  <!-- Arrow down 2 -->
  <text x="750" y="1170" text-anchor="middle" style="font-size:60px;fill:#3b82f6;font-family:-apple-system,sans-serif;">↓</text>

  <!-- Step 3 -->
  <rect x="100" y="1200" width="1300" height="340" rx="20" fill="#dbeafe"/>
  <rect x="100" y="1200" width="10" height="340" rx="5" fill="#1d4ed8"/>
  <circle cx="200" cy="1370" r="55" fill="#1d4ed8"/>
  <text x="200" y="1388" text-anchor="middle" style="font-size:52px;font-weight:700;fill:#fff;font-family:-apple-system,sans-serif;">3</text>
  <text x="310" y="1300" style="font-size:46px;font-weight:700;fill:#1e3a8a;font-family:-apple-system,'PingFang SC',sans-serif;">自然连读（正常速度）</text>
  <text x="310" y="1370" style="font-size:56px;font-weight:700;fill:#1d4ed8;font-family:-apple-system,sans-serif;">black !</text>
  <text x="310" y="1440" style="font-size:34px;fill:#374151;font-family:-apple-system,'PingFang SC',sans-serif;">bl 融为一体，自然流畅地发出</text>
  <text x="310" y="1500" style="font-size:34px;fill:#1d4ed8;font-family:-apple-system,'PingFang SC',sans-serif;">恭喜！这就是辅音连缀！</text>

  <!-- Summary -->
  <rect x="100" y="1600" width="1300" height="160" rx="16" fill="#1e3a8a"/>
  <text x="750" y="1668" text-anchor="middle" style="font-size:38px;fill:#93c5fd;font-family:-apple-system,'PingFang SC',sans-serif;">练习建议</text>
  <text x="750" y="1738" text-anchor="middle" style="font-size:42px;font-weight:700;fill:#fff;font-family:-apple-system,'PingFang SC',sans-serif;">每天 5 分钟，一个连缀练 10 遍</text>

  <!-- More examples -->
  <text x="750" y="1840" text-anchor="middle" style="font-size:38px;fill:#374151;font-family:-apple-system,sans-serif;">同样方法练：frog · stop · cry · swim</text>

  <rect x="0" y="1870" width="1500" height="130" fill="#dbeafe"/>
  <text x="750" y="1952" text-anchor="middle" style="font-size:32px;fill:#1d4ed8;font-family:-apple-system,'PingFang SC',sans-serif;">自然拼读 Phonics · 辅音连缀专题</text>
</svg>
