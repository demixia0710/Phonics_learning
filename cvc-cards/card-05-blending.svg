<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 2000">
  <style>
    .title { font: bold 80px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #1a1a1a; }
    .step-num { font: bold 48px -apple-system, "SF Pro Display", sans-serif; fill: #fff; }
    .step-title { font: bold 44px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #1a1a1a; }
    .letter { font: bold 100px -apple-system, "SF Pro Display", sans-serif; }
    .phonetic { font: 48px -apple-system, "SF Pro Display", sans-serif; fill: #666; }
    .word { font: bold 120px -apple-system, "SF Pro Display", sans-serif; fill: #2563eb; }
    .desc { font: 32px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #666; }
    .tip { font: bold 40px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #2563eb; }
  </style>
  
  <rect width="1500" height="2000" fill="#fafbfc"/>
  
  <text x="750" y="150" text-anchor="middle" class="title">CVC 拼读三步法</text>
  
  <!-- 步骤1：分解 -->
  <g transform="translate(750, 450)">
    <circle cx="0" cy="0" r="60" fill="#64748b"/>
    <text x="0" y="18" text-anchor="middle" class="step-num">1</text>
    <text x="0" y="110" text-anchor="middle" class="step-title">分解</text>
    
    <g transform="translate(0, 220)">
      <text x="-110" y="0" text-anchor="middle" class="letter" fill="#64748b">c</text>
      <text x="0" y="0" text-anchor="middle" class="letter" fill="#2563eb">a</text>
      <text x="110" y="0" text-anchor="middle" class="letter" fill="#64748b">t</text>
    </g>
    <text x="0" y="400" text-anchor="middle" class="desc">把单词拆成3个字母</text>
  </g>
  
  <!-- 箭头1 -->
  <g transform="translate(750, 920)">
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#cbd5e1" stroke-width="6"/>
    <polygon points="100,0 80,-15 80,15" fill="#cbd5e1"/>
  </g>
  
  <!-- 步骤2：发音 -->
  <g transform="translate(750, 1050)">
    <circle cx="0" cy="0" r="60" fill="#f97316"/>
    <text x="0" y="18" text-anchor="middle" class="step-num">2</text>
    <text x="0" y="110" text-anchor="middle" class="step-title">发音</text>
    
    <g transform="translate(0, 220)">
      <text x="-130" y="0" text-anchor="middle" class="phonetic">/k/</text>
      <text x="0" y="0" text-anchor="middle" class="phonetic">/æ/</text>
      <text x="130" y="0" text-anchor="middle" class="phonetic">/t/</text>
    </g>
    <text x="0" y="320" text-anchor="middle" class="desc">依次读出每个音</text>
  </g>
  
  <!-- 箭头2 -->
  <g transform="translate(750, 1440)">
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#cbd5e1" stroke-width="6"/>
    <polygon points="100,0 80,-15 80,15" fill="#cbd5e1"/>
  </g>
  
  <!-- 步骤3：滑动 -->
  <g transform="translate(750, 1550)">
    <circle cx="0" cy="0" r="60" fill="#2563eb"/>
    <text x="0" y="18" text-anchor="middle" class="step-num">3</text>
    <text x="0" y="110" text-anchor="middle" class="step-title">滑动</text>
    
    <text x="0" y="240" text-anchor="middle" class="word">cat!</text>
  </g>
  
  <!-- 底部提示 -->
  <g transform="translate(750, 1900)">
    <rect x="-400" y="-45" width="800" height="90" rx="45" fill="#eff6ff"/>
    <text x="0" y="15" text-anchor="middle" class="tip">技巧：手指点读，从左到右滑动</text>
  </g>
</svg>
