<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 2000">
  <style>
    .title { font: bold 80px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #1a1a1a; }
    .subtitle { font: 36px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #666; }
    .consonant { font: bold 48px -apple-system, "SF Pro Display", sans-serif; fill: #64748b; }
    .vowel { font: bold 48px -apple-system, "SF Pro Display", sans-serif; fill: #2563eb; }
    .label { font: 32px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #666; }
    .highlight { font: bold 40px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #1a1a1a; }
    .bread-text { font: bold 40px -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; fill: #fff; }
  </style>
  
  <rect width="1500" height="2000" fill="#fafbfc"/>
  
  <!-- 标题 -->
  <text x="750" y="180" text-anchor="middle" class="title">认识辅音 C</text>
  <text x="750" y="260" text-anchor="middle" class="subtitle">Consonant - 气流受阻的音</text>
  
  <!-- 字母表展示 -->
  <g transform="translate(750, 500)">
    <!-- 第一行 A-M -->
    <text x="-540" y="0" text-anchor="middle" class="vowel">A</text>
    <text x="-450" y="0" text-anchor="middle" class="consonant">B</text>
    <text x="-360" y="0" text-anchor="middle" class="consonant">C</text>
    <text x="-270" y="0" text-anchor="middle" class="consonant">D</text>
    <text x="-180" y="0" text-anchor="middle" class="vowel">E</text>
    <text x="-90" y="0" text-anchor="middle" class="consonant">F</text>
    <text x="0" y="0" text-anchor="middle" class="consonant">G</text>
    <text x="90" y="0" text-anchor="middle" class="consonant">H</text>
    <text x="180" y="0" text-anchor="middle" class="vowel">I</text>
    <text x="270" y="0" text-anchor="middle" class="consonant">J</text>
    <text x="360" y="0" text-anchor="middle" class="consonant">K</text>
    <text x="450" y="0" text-anchor="middle" class="consonant">L</text>
    <text x="540" y="0" text-anchor="middle" class="consonant">M</text>
    
    <!-- 第二行 N-Z -->
    <text x="-495" y="90" text-anchor="middle" class="consonant">N</text>
    <text x="-405" y="90" text-anchor="middle" class="vowel">O</text>
    <text x="-315" y="90" text-anchor="middle" class="consonant">P</text>
    <text x="-225" y="90" text-anchor="middle" class="consonant">Q</text>
    <text x="-135" y="90" text-anchor="middle" class="consonant">R</text>
    <text x="-45" y="90" text-anchor="middle" class="consonant">S</text>
    <text x="45" y="90" text-anchor="middle" class="consonant">T</text>
    <text x="135" y="90" text-anchor="middle" class="vowel">U</text>
    <text x="225" y="90" text-anchor="middle" class="consonant">V</text>
    <text x="315" y="90" text-anchor="middle" class="consonant">W</text>
    <text x="405" y="90" text-anchor="middle" class="consonant">X</text>
    <text x="495" y="90" text-anchor="middle" class="consonant">Y</text>
    <text x="585" y="90" text-anchor="middle" class="consonant">Z</text>
  </g>
  
  <!-- 图例 -->
  <g transform="translate(750, 720)">
    <rect x="-250" y="-25" width="50" height="50" rx="8" fill="#64748b"/>
    <text x="-180" y="12" class="label">辅音 21个</text>
    <rect x="50" y="-25" width="50" height="50" rx="8" fill="#2563eb"/>
    <text x="120" y="12" class="label">元音 5个</text>
  </g>
  
  <!-- 三明治隐喻 - 放大 -->
  <g transform="translate(750, 1200)">
    <!-- 上面包 -->
    <rect x="-250" y="-200" width="500" height="120" rx="60" fill="#d4a574"/>
    <text x="0" y="-120" text-anchor="middle" class="bread-text">C 辅音</text>
    
    <!-- 夹心 -->
    <rect x="-220" y="-70" width="440" height="100" rx="12" fill="#2563eb"/>
    <text x="0" y="-5" text-anchor="middle" fill="#fff" font-size="44" font-weight="bold" font-family="-apple-system, PingFang SC, sans-serif">V 元音</text>
    
    <!-- 下面包 -->
    <rect x="-250" y="40" width="500" height="120" rx="60" fill="#d4a574"/>
    <text x="0" y="120" text-anchor="middle" class="bread-text">C 辅音</text>
  </g>
  
  <!-- 底部说明 -->
  <g transform="translate(750, 1700)">
    <rect x="-400" y="-50" width="800" height="100" rx="50" fill="#f1f5f9"/>
    <text x="0" y="18" text-anchor="middle" class="highlight">辅音像面包片，把元音夹在中间</text>
  </g>
</svg>
