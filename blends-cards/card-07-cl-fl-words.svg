  <!-- Pronunciation comparison -->
  <rect x="100" y="1090" width="1300" height="80" rx="14" fill="#1e3a8a"/>
  <text x="750" y="1142" text-anchor="middle" style="font-size:36px;fill:#fff;font-family:-apple-system,'PingFang SC',sans-serif;">cl/fl 后接 l，嘴型圆滑；cr/fr 后接 r，舌头卷起</text>

  <!-- Extended word section -->
  <text x="750" y="1240" text-anchor="middle" style="font-size:42px;font-weight:700;fill:#0f172a;font-family:-apple-system,'PingFang SC',sans-serif;">延伸词汇</text>

  <text x="150" y="1330" style="font-size:40px;fill:#0f172a;font-family:-apple-system,sans-serif;">cl: clever  click  close  club  clue</text>
  <text x="150" y="1420" style="font-size:40px;fill:#0f172a;font-family:-apple-system,sans-serif;">cr: crack  craft  crash  crazy  creek</text>
  <text x="150" y="1510" style="font-size:40px;fill:#0f172a;font-family:-apple-system,sans-serif;">fl: flash  fling  float  flush  flock</text>
  <text x="150" y="1600" style="font-size:40px;fill:#0f172a;font-family:-apple-system,sans-serif;">fr: frame  frank  frown  frost  fry</text>

  <rect x="100" y="1680" width="1300" height="120" rx="14" fill="#dbeafe"/>
  <text x="750" y="1732" text-anchor="middle" style="font-size:36px;fill:#1e3a8a;font-family:-apple-system,'PingFang SC',sans-serif;">小技巧：遇到不认识的 cl/cr/fl/fr 单词</text>
